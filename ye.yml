name: YA CORRIGE LISTA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gzip xmlstarlet

      - name: Download playlist
        run: |
          wget -O lista.m3u "https://github.com/gratinomaster/JCTV/raw/refs/heads/main/lista1.m3u"

      - name: Extract channel IDs
        run: |
          grep -o 'tvg-id="[^"]*"' lista.m3u | sed 's/tvg-id="//;s/"//' | sort -u > canais.txt
          echo "Canais encontrados:"
          cat canais.txt

      - name: Download EPG
        run: |
          wget -O epg.xml "https://url-do-seu-epg.xml"

      - name: Filter EPG by channels
        run: |
          echo "Filtrando EPG..."

          # Criar arquivo base
          echo '<?xml version="1.0" encoding="UTF-8"?>' > LISTA.xml
          echo '<tv>' >> LISTA.xml

          # Adicionar apenas canais presentes
          while read id; do
            xmlstarlet sel -t -c "//channel[@id='$id']" epg.xml >> LISTA.xml
            xmlstarlet sel -t -c "//programme[@channel='$id']" epg.xml >> LISTA.xml
          done < canais.txt

          echo '</tv>' >> LISTA.xml

      - name: Compress EPG
        run: |
          gzip -f LISTA.xml

      - name: Check generated files
        run: |
          echo "Arquivos gerados:"
          ls -lh

      - name: Commit files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add LISTA.xml.gz lista.m3u canais.txt || true
          git commit -m "Atualização automática da lista e EPG filtrado" || echo "Nada para commit"
          git push origin HEAD || echo "Falha ao dar push"
