name: YA CORRIGE LISTA

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */8 * * *"

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gzip xmlstarlet

      - name: Download playlist
        run: |
          wget -q -O lista.m3u "https://github.com/gratinomaster/JCTV/raw/refs/heads/main/lista1.m3u"

      - name: Extract channel IDs
        run: |
          grep -o 'tvg-id="[^"]*"' lista.m3u \
          | sed 's/tvg-id="//;s/"//' \
          | sort -u > canais.txt

      - name: Extract EPG URLs (FIXED)
        run: |
          grep -Eo 'https?://[^"]+' lista.m3u \
          | tr ',' '\n' \
          | grep -E '\.xml(\.gz)?$' \
          | sort -u > epg_urls.txt

          echo "EPGs encontrados:"
          cat epg_urls.txt

      - name: Download and prepare EPGs
        run: |
          mkdir epgs

          while read url; do
            echo "Baixando $url"

            fname=$(basename "$url")

            wget -q -O "epgs/$fname" "$url" || continue

            if [[ "$fname" == *.gz ]]; then
              gunzip -f "epgs/$fname"
            fi

          done < epg_urls.txt

      - name: Merge EPGs (SAFE)
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > epg.xml
          echo '<tv>' >> epg.xml

          found=0

          for file in epgs/*.xml; do
            [ -f "$file" ] || continue
            found=1
            sed '1,/<tv>/d' "$file" | sed '/<\/tv>/d' >> epg.xml
          done

          if [ "$found" -eq 0 ]; then
            echo "Nenhum EPG válido encontrado!"
            exit 1
          fi

          echo '</tv>' >> epg.xml

      - name: Filter EPG
        run: |
          echo '<?xml version="1.0" encoding="UTF-8"?>' > LISTA.xml
          echo '<tv>' >> LISTA.xml

          while read id; do
            xmlstarlet sel -t -c "//channel[@id='$id']" epg.xml >> LISTA.xml
            xmlstarlet sel -t -c "//programme[@channel='$id']" epg.xml >> LISTA.xml
          done < canais.txt

          echo '</tv>' >> LISTA.xml

      - name: Compress final EPG
        run: |
          gzip -f LISTA.xml

      - name: Cleanup unnecessary files
        run: |
          rm -rf lista.m3u canais.txt epg_urls.txt epg.xml epgs || true

      - name: Commit final file only
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add LISTA.xml.gz || true
          git commit -m "EPG filtrado automático" || echo "Nada para commit"
          git push
