name: Generate Audiobook

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  audiobook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências do sistema (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Instalar dependências Python
        run: |
          pip install --upgrade pip
          pip install piper-tts pathvalidate pydub soundfile

      - name: Rodar geração do audiobook
        run: |
          python generate_audiobook.py

      - name: Listar arquivos gerados
        run: ls -lh audiobook_output/

      - name: Copiar arquivo final
        run: |
          cp audiobook_output/*.wav .

      - name: Commit e push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.wav || true
          git commit -m "Add audiobook gerado" || echo "Nada para commit"

      - name: Push com retry
        run: |
          for i in {1..5}; do
            git pull --rebase origin main && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main && break
            echo "Retry $i..."
            sleep 5
          done
