name: Run OpenCode Audiobook

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      pergunta:
        description: "Pergunta para o OpenCode"
        required: true
        default: "preciso de um audiolivro com base nisso https://archive.org/details/Gram_tica_inglesa_para_dummies caso esteja em outro idioma, traduza para portugues, com leitura com voz em portugues com sotaque de portugal, preciso de voz natural, não robotica, não quero voz da microsoft nem voz do google, use Piper TTS alterne entre cadu, faber, jeff, jeff2 e tugao, a cada 5 minutos de audio,uma voz é trocada"

jobs:
  run-opencode:
    runs-on: ubuntu-latest

    concurrency:
      group: opencode-job
      cancel-in-progress: false

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configurar Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Instalar OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "/home/runner/.opencode/bin" >> $GITHUB_PATH

      - name: Instalar dependências Python (Piper + fixes)
        run: |
          pip install --upgrade pip
          pip install piper-tts pathvalidate pydub soundfile

      - name: Verificar instalação
        run: |
          opencode --version
          python --version

      - name: Definir pergunta
        run: |
          if [ -n "${{ github.event.inputs.pergunta }}" ]; then
            echo "PERGUNTA=${{ github.event.inputs.pergunta }}" >> $GITHUB_ENV
          else
            echo "PERGUNTA=preciso de um audiolivro com base nisso https://archive.org/details/Gram_tica_inglesa_para_dummies caso esteja em outro idioma, traduza para portugues, com leitura com voz em portugues com sotaque de portugal, preciso de voz natural, não robotica, não quero voz da microsoft nem voz do google, use Piper TTS alterne entre cadu, faber, jeff, jeff2 e tugao, a cada 5 minutos de audio,uma voz é trocada" >> $GITHUB_ENV
          fi

      - name: Executar OpenCode
        run: |
          echo "Pergunta: $PERGUNTA"
          opencode run "$PERGUNTA" > output.txt

      # 🔥 Aqui você roda seu script que usa Piper
      - name: Gerar audiobook com Piper
        run: |
          python generate_audiobook.py

      - name: Listar saída
        run: |
          ls -lh
          ls -lh audiobook_output/ || true

      - name: Copiar áudio final
        run: |
          cp audiobook_output/*.wav . || true

      - name: Commit resultado
        run: |
          git add *.wav output.txt || true
          git commit -m "Atualiza audiobook via OpenCode" || echo "Nada para commit"

      - name: Push com retry (anti-conflito)
        run: |
          for i in {1..5}; do
            git pull --rebase origin main && \
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main && break
            echo "Tentativa $i falhou, retry..."
            sleep 5
          done
