name: ya
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Nome do arquivo de saída (ex: lista.m3u)"
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TTS and Audio Tools
        run: |
          sudo apt-get update
          # Instalar espeak-ng (necessário para o Piper processar fonemas) e ffmpeg
          sudo apt-get install -y wget gzip ffmpeg espeak-ng espeak-ng-data
          
          # Instalar Piper TTS
          PIPER_VER="1.2.0"
          wget -q https://github.com/rhasspy/piper/releases/download/v${PIPER_VER}/piper_amd64.tar.gz
          tar -xf piper_amd64.tar.gz
          sudo mv piper/piper /usr/local/bin/
          sudo mv piper/lib* /usr/local/lib/
          sudo ldconfig
          
          # Baixar voz em Português do Brasil (Voz "Cadu" - Qualidade Média)
          mkdir -p tts_models
          wget -q -O tts_models/pt_BR-cadu-medium.onnx https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx
          wget -q -O tts_models/pt_BR-cadu-medium.onnx.json https://huggingface.co/rhasspy/piper-voices/resolve/main/pt/pt_BR/cadu/medium/pt_BR-cadu-medium.onnx.json
          
          echo "Piper TTS, espeak-ng e FFmpeg instalados com sucesso."

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode and save output
        run: |
          # Instrução detalhada para o OpenCode usar o Piper com as dependências locais
          SYSTEM_PROMPT="O Piper TTS está instalado localmente e depende do espeak-ng (já instalado). Para gerar áudio em português do Brasil, use: echo 'TEXTO' | piper --model tts_models/pt_BR-cadu-medium.onnx --output_file audio.wav. Em seguida, use ffmpeg -i audio.wav audio.mp3 para converter. "
          opencode run "$SYSTEM_PROMPT ${{ github.event.inputs.prompt }}" > "${{ github.event.inputs.filename }}"

      - name: Commit generated files safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Adiciona arquivos se existirem
          files_to_add=$(ls *.m3u *.txt *.mp3 *.mp4 *.wav 2>/dev/null || true)
          
          if [ -n "$files_to_add" ]; then
            git add $files_to_add
            git commit -m "Adiciona arquivos gerados"
            
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
            done
            
            for i in 1 2 3; do
              git push origin HEAD:${{ github.ref_name }} && break || sleep 2
            done
          else
            echo "Nenhum arquivo para commit"
          fi
