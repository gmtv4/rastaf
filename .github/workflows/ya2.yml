name: ya

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Nome do arquivo de saída (ex: lista.m3u)"
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # importante para rebase

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode and save output
        run: |
          opencode run "${{ github.event.inputs.prompt }}" > "${{ github.event.inputs.filename }}"

      # ------------------------
      # Debug: lista arquivos gerados
      # ------------------------
      - name: List files generated
        run: |
          echo "Arquivos gerados pelo OpenCode:"
          find . -type f

      # ------------------------
      # Move qualquer mp3 criado para a raiz
      # ------------------------
      - name: Collect audio files
        run: |
          find . -type f -iname "*.mp3" -exec mv {} . \; 2>/dev/null || true

      # ------------------------
      # Commit dos arquivos gerados
      # ------------------------
      - name: Commit generated files safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # adiciona .txt, .m3u e .mp3
          git add *.txt *.m3u *.mp3 || true
          git commit -m "Adiciona arquivos gerados" || echo "Nada para commit"

          # sincroniza antes de enviar
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
          done

          # push com retry
          for i in 1 2 3; do
            git push origin HEAD:${{ github.ref_name }} && break || sleep 2
          done
