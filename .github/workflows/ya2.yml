name: ya

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Nome do arquivo de saída (ex: lista.m3u)"
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # importante para rebase

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode and save output
        run: |
          opencode run "${{ github.event.inputs.prompt }}" > "${{ github.event.inputs.filename }}"

      - name: Commit generated files safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Adiciona arquivos se existirem
          files_to_add=$(ls *.m3u *.txt *.mp3 *.mp4 2>/dev/null || true)
          
          if [ -n "$files_to_add" ]; then
            git add $files_to_add
            git commit -m "Adiciona arquivos gerados"
            
            # Tenta sincronizar antes de enviar
            for i in 1 2 3; do
              git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
            done

            # Push com retry
            for i in 1 2 3; do
              git push origin HEAD:${{ github.ref_name }} && break || sleep 2
            done
          else
            echo "Nenhum arquivo para commit"
          fi
