name: ya

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Arquivo de saída principal (ex: lista.txt)"
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Run OpenCode
        run: |
          opencode run "${{ github.event.inputs.prompt }}" > "${{ github.event.inputs.filename }}"

      # 🔍 DEBUG — ver tudo que foi criado
      - name: List generated files
        run: |
          echo "Arquivos no workspace:"
          find . -type f

      # 📦 GARANTE que qualquer áudio venha pra raiz do repo
      - name: Collect media files
        run: |
          echo "Movendo arquivos de mídia para raiz..."
          find . -type f \( -iname "*.mp3" -o -iname "*.wav" -o -iname "*.m4a" \) -exec mv {} . \; 2>/dev/null || true

      # 🔍 DEBUG depois de mover
      - name: List files after move
        run: |
          echo "Arquivos após organização:"
          find . -type f

      - name: Commit generated files safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          # adiciona TUDO (não perde mais mp3)
          git add .

          git commit -m "Arquivos gerados via OpenCode" || echo "Nada para commit"

          # sincroniza antes de enviar
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
          done

          # push com retry
          for i in 1 2 3; do
            git push origin HEAD:${{ github.ref_name }} && break || sleep 2
          done
