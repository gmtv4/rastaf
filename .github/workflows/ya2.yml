name: ya

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Nome base do arquivo (sem extensão)"
        required: true

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Generate text with OpenCode
        run: |
          opencode run "${{ github.event.inputs.prompt }}" > texto.txt

      - name: Install TTS (gTTS)
        run: pip install gtts

      - name: Convert text to MP3
        run: |
          python - <<EOF
from gtts import gTTS

with open("texto.txt", "r") as f:
    text = f.read()

tts = gTTS(text=text, lang="pt")
tts.save("${{ github.event.inputs.filename }}.mp3")
EOF

      - name: Commit generated files safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add *.txt *.mp3 || true
          git commit -m "Adiciona audiolivro gerado" || echo "Nada para commit"

          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
          done

          for i in 1 2 3; do
            git push origin HEAD:${{ github.ref_name }} && break || sleep 2
          done
