name: ya

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "O que você quer gerar"
        required: true
      filename:
        description: "Arquivo de saída principal (opcional)"
        required: false

jobs:
  opencode:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install OpenCode
        run: |
          curl -fsSL https://opencode.ai/install | bash
          echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      # 🔥 Gera script em vez de só texto
      - name: Generate script with OpenCode
        run: |
          opencode run "${{ github.event.inputs.prompt }}" > script.sh

      # 🔍 Debug do script gerado
      - name: Show generated script
        run: |
          echo "===== SCRIPT GERADO ====="
          cat script.sh

      # 🚀 Executa o que o opencode criou
      - name: Run generated script
        run: |
          chmod +x script.sh
          bash script.sh

      # 🔍 Ver tudo que foi criado
      - name: List generated files
        run: |
          echo "Arquivos encontrados:"
          find . -type f

      # 📦 Move mídias pra raiz
      - name: Collect media files
        run: |
          find . -type f \( -iname "*.mp3" -o -iname "*.wav" -o -iname "*.m4a" \) -exec mv {} . \; 2>/dev/null || true

      # 🔍 Debug final
      - name: Final file list
        run: |
          echo "Arquivos finais:"
          find . -type f

      # 💾 Commit de tudo
      - name: Commit generated files safely
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          git commit -m "Arquivos gerados dinamicamente" || echo "Nada para commit"

          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && break || sleep 2
          done

          for i in 1 2 3; do
            git push origin HEAD:${{ github.ref_name }} && break || sleep 2
          done
